# Starter pipeline
# Start with a minimal pipeline that you can customize to build and deploy your code.
# Add steps that build, run tests, deploy, and more:
# https://aka.ms/yaml

trigger:
- main

pool:
  vmImage: ubuntu-latest

variables:
  acrserviceconnection: crepay-acr
  tag: '$(Build.BuildId)'
  frontendrepo: credpay/frontend_service
  paymentservicerepo : credpay/payment_service
  userservicerepo: credpay/user_service

stages:
  - stage: Docker 
    displayName: Docker Build and Push
    jobs:
      - job: BuildandPushImages
        steps:
          - checkout: self
          - script: |
              echo "Repository : $(Build.Repository.Name)"
              echo "Branch     : $(Build.SourceBranch)"
              echo "Build ID   : $(Build.BuildId)"
              echo "Image Tag  : $(tag)"
            displayName: Build Information
          - task: Docker@2
            displayName: Build and Push Frontend Image
            inputs:
              containerRegistry: 'credpay-acr'
              repository: '$(frontendrepo)'
              command: 'buildAndPush'
              Dockerfile: 'frontend-react/Dockerfile'
              tags: |
                $(tag)
                latest
          - task: Docker@2
            displayName: Build and Push Payment Service Image
            inputs:
              containerRegistry: 'credpay-acr'
              repository: '$(paymentservicerepo)'
              command: 'buildAndPush'
              Dockerfile: 'payment-service/Dockerfile'
              tags: |
                $(tag)
                latest
          - task: Docker@2
            displayName: Build and Push User Service Image
            inputs:
              containerRegistry: 'credpay-acr'
              repository: '$(userservicerepo)'
              command: 'buildAndPush'
              Dockerfile: 'user-service/Dockerfile'
              tags: |
                $(tag)
                latest




